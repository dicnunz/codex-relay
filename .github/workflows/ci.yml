name: ci

on:
  push:
  pull_request:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Shell syntax
        run: for f in scripts/*.sh; do zsh -n "$f"; done
      - name: Python syntax
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile $(git ls-files '*.py')
      - name: Smoke tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH="$PWD" python3 scripts/smoke_test.py
      - name: System Python smoke tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH="$PWD" /usr/bin/python3 scripts/smoke_test.py
      - name: Local demo
        run: PYTHONDONTWRITEBYTECODE=1 ./scripts/demo.sh
      - name: Generated demo assets
        run: |
          brew install ffmpeg
          cp assets/codex-relay-demo.mp4 "$RUNNER_TEMP/codex-relay-demo-before.mp4"
          ./scripts/record_demo.sh
          git diff --exit-code -- assets/social-card.svg assets/social-card.png assets/demo-transcript.svg assets/codex-relay-demo-poster.png
          test "$(ffprobe -v error -show_entries stream=width,height -of csv=p=0:s=x assets/codex-relay-demo.mp4 | head -n1)" = "1280x720"
          test "$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 assets/codex-relay-demo.mp4)" = "15.000000"
          ffmpeg -i "$RUNNER_TEMP/codex-relay-demo-before.mp4" -i assets/codex-relay-demo.mp4 -lavfi "[0:v][1:v]ssim" -f null - 2> "$RUNNER_TEMP/demo-ssim.log"
          python3 -c 'import os, pathlib, re; text = pathlib.Path(os.environ["RUNNER_TEMP"], "demo-ssim.log").read_text(); values = [float(match) for match in re.findall(r"All:([0-9.]+)", text)]; assert values and min(values) >= 0.99, text'
      - name: Fresh clone path
        run: PYTHONDONTWRITEBYTECODE=1 ./scripts/fresh_clone_test.sh
